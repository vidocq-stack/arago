# Full local dev / demo stack: Arago + PostgreSQL 16, with the superadmin account AND seeded speakers
# (local email + password auth — no external identity provider).
#
#   docker compose -f docker-compose.localdev.yml up --build
#
# Unlike the prod-like docker-compose.yml (Arago + Postgres, no seeded accounts), this pre-provisions
# both consoles so you can exercise them immediately:
#
#   • Superadmin — http://localhost:8080/admin     (login: root / arago-dev — see hash below).
#                  Carried on the X-Arago-Admin header.
#   • Speaker    — http://localhost:8080/speaker    (login: speakera@oidc.test or speakerb@oidc.test,
#                  password "pw"). Seeded into the allowlist at boot (ARAGO_DEV_SEED_SPEAKER) with an
#                  initial password (ARAGO_DEV_SEED_SPEAKER_PASSWORD) — zero manual invite step.
#
# NOT for production: dev secrets, seeded speakers, a database port exposed on the host.
services:
  postgres:
    image: postgres:16-alpine
    container_name: arago-localdev-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arago}
      POSTGRES_USER: ${POSTGRES_USER:-arago}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arago}
    # Exposed on a fixed host port for parity with `vidocq:dev` (which binds 65123) — connect a DB tool
    # to localhost:65123. The in-network host for Arago stays postgres:5432 (see arago env below).
    ports:
      - "65123:5432"
    volumes:
      - arago-localdev-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arago} -d ${POSTGRES_DB:-arago}"]
      interval: 5s
      timeout: 5s
      retries: 10

  arago:
    build: .
    image: registry.vidocq.dev/vidocq-tools/arago:0.1.0-SNAPSHOT
    container_name: arago-localdev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # MP Config env mapping: vidocq.pool.* <- VIDOCQ_POOL_*
      VIDOCQ_POOL_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-arago}
      VIDOCQ_POOL_USERNAME: ${POSTGRES_USER:-arago}
      VIDOCQ_POOL_PASSWORD: ${POSTGRES_PASSWORD:-arago}

      # Superadmin break-glass account (spec §4.8). Password "arago-dev"; regenerate the hash with
      #   echo -n '<pwd>' | java -m io.vidocq.tools.arago.server/io.vidocq.tools.arago.cli.HashPasswordCli
      # The PBKDF2 hash's '$' are doubled ('$$') so Compose does not treat them as variables.
      ARAGO_SUPERADMIN_USERNAME: root
      ARAGO_SUPERADMIN_PASSWORD_HASH: "$$pbkdf2-sha256$$i=600000$$KdTP9feTdyesm19Cnf9vMA$$gfP0bnjcnwSqTNcPSyCUfSVIJ6iIirq9XkhB/3hUG2s"
      # Signs speaker/attendee/profile/superadmin HS256 tokens. Dev-only — rotate in prod.
      ARAGO_ATTENDEE_HMAC_SECRET: arago-localdev-only-hmac-secret-change-me

      # Dev convenience: provision speakers into the allowlist at boot (local auth), each with the initial
      # password below, so a local login works with no manual invite. Comma-separated "email" or
      # "email=ROLE". OFF in prod (keys unset). Here: speakerA as ADMIN + speakerB as SPEAKER, password "pw".
      ARAGO_DEV_SEED_SPEAKER: speakera@oidc.test=ADMIN,speakerb@oidc.test=SPEAKER
      ARAGO_DEV_SEED_SPEAKER_PASSWORD: pw

      # RGPD §4.7: no SMTP locally — expose the magic link in the POST /api/profile/magic-link response.
      ARAGO_MAIL_DEV_EXPOSE_LINK: "true"
    ports:
      - "8080:8080"

volumes:
  arago-localdev-pgdata:
