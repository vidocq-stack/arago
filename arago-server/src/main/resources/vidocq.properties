# ===========================================================================
# Arago runtime configuration (MicroProfile Config via ravel).
# Dev defaults here; in prod every value is overridden by env vars.
# MP Config env mapping: vidocq.pool.url -> VIDOCQ_POOL_URL, etc.
# ===========================================================================

# Chappe HTTP listener
vidocq.chappe.listener.default.host=0.0.0.0
vidocq.chappe.listener.default.port=8080

# REST API (Cassini = JAX-RS 4.0 over Chappe), mounted at /api. The knock health
# resource is excluded here so it is NOT exposed under /api (it gets its own root mount below).
vidocq.http.mount.api.path=/api
vidocq.http.mount.api.type=restful
vidocq.http.mount.api.exclude-packages=io.vidocq.knock.jaxrs

# MicroProfile Health at the standard root paths /health, /health/live|ready|started.
# strip-prefix=false → routing-only mount: knock-jaxrs's resource keeps its absolute @Path("/health")
# and Cassini sees the full path (no prefix doubling), while / (static) and /api stay routable.
# Scoped to the knock package so this mount only serves the health resource.
vidocq.http.mount.health.path=/health
vidocq.http.mount.health.type=restful
vidocq.http.mount.health.strip-prefix=false
vidocq.http.mount.health.include-packages=io.vidocq.knock.jaxrs

# Static front (Svelte build + reveal stub) served at the root.
vidocq.http.mount.ui.path=/
vidocq.http.mount.ui.type=static
vidocq.http.mount.ui.classpath=static
vidocq.http.mount.ui.cache-in-memory=true

# Mansart pool — PostgreSQL. The dialect is selected by the
# mansart-data-dialect-postgresql artifact on the module path (ServiceLoader).
vidocq.pool.url=jdbc:postgresql://localhost:5432/arago
vidocq.pool.username=arago
vidocq.pool.password=arago
vidocq.pool.maxSize=16
vidocq.pool.acquireTimeout=PT10S
