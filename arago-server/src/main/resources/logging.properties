# JUL configuration loaded by App before Vidocq boots.
# Structured/JSON logging and SLF4J bridge come later; this keeps Phase 0 readable.
handlers=java.util.logging.ConsoleHandler
.level=INFO

java.util.logging.ConsoleHandler.level=ALL
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter
java.util.logging.SimpleFormatter.format=%1$tFT%1$tT.%1$tL%1$tz %4$-7s [%3$s] %5$s%6$s%n

# Quiet a few noisy boot loggers.
io.vidocq.level=INFO
org.flywaydb.level=INFO
